<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Rei da Mesa — Wild Rift 1v1</title>

<style>
:root {
  --gold: #C89B3C; --gold-light: #F0C96A; --gold-dark: #8B6914;
  --purple-deep: #0A0514; --purple-mid: #1A0A2E;
  --purple-accent: #6B21A8; --purple-bright: #9333EA; --purple-glow: #C026D3;
  --silver: #A8A8B8; --white: #F5F0E8;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background-color: var(--purple-deep);
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(107,33,168,0.4) 0%, transparent 70%),
    radial-gradient(ellipse 50% 30% at 80% 100%, rgba(192,38,211,0.15) 0%, transparent 60%),

  min-height: 100vh;
  font-family: 'Rajdhani', sans-serif;
  color: var(--white);
  overflow-x: hidden;
}

/* ... (MANTIVE TODO SEU CSS ORIGINAL) ... */

/* ===== NOVO: TWITCH + RANK (sem quebrar visual atual) ===== */
#rank-btn {
  position:fixed; left:0; top:50%; transform:translateY(-50%);
  z-index:260; width:38px; height:90px;
  background:rgba(26,10,46,0.95);
  border:1px solid rgba(200,155,60,0.3); border-left:none;
  border-radius:0 10px 10px 0; cursor:pointer;
  color:var(--gold); font-size:18px;
}
#rank-panel {
  position:fixed; left:-360px; top:0; width:340px; height:100vh; z-index:270;
  background:linear-gradient(180deg,rgba(18,7,35,0.99),rgba(10,5,20,0.99));
  border-right:1px solid rgba(200,155,60,0.2);
  box-shadow:10px 0 40px rgba(0,0,0,0.6);
  transition:left .35s cubic-bezier(0.4,0,0.2,1);
  display:flex; flex-direction:column;
}
#rank-panel.open { left:0; }
.rank-head {
  padding:1rem; border-bottom:1px solid rgba(200,155,60,0.15);
  display:flex; justify-content:space-between; align-items:center;
}
.rank-title { font-family:'Cinzel Decorative',serif; color:var(--gold); }
.rank-close { background:none; border:none; color:var(--silver); font-size:1.2rem; cursor:pointer; }
.rank-list { padding:1rem; overflow-y:auto; display:flex; flex-direction:column; gap:.4rem; }
.rank-item {
  display:grid; grid-template-columns:38px 1fr auto; gap:.5rem; align-items:center;
  padding:.45rem .6rem; border-radius:6px;
  background:rgba(255,255,255,0.04); border:1px solid rgba(200,155,60,0.12);
}
.rank-pos { color:var(--gold); font-weight:700; text-align:center; }
.rank-user { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rank-pts { color:#6ee7b7; font-weight:700; }
.rank-empty { color:rgba(168,168,184,0.5); text-align:center; padding:1rem; }

#twitch-fab {
  position:fixed; left:14px; bottom:14px; z-index:280;
  width:52px; height:52px; border:none; border-radius:50%;
  background:#9146FF; color:#fff; font-size:22px; cursor:pointer;
  box-shadow:0 8px 25px rgba(145,70,255,.45);
}

/* Modal usa sua classe overlay já existente */
#twitch-overlay { z-index:250; }
.twitch-card {
  background:linear-gradient(135deg,rgba(26,10,46,0.98),rgba(10,5,20,0.99));
  border:1px solid rgba(200,155,60,0.35); border-radius:14px;
  padding:1.2rem; max-width:560px; width:100%;
}
.twitch-title { font-family:'Cinzel',serif; color:var(--gold); letter-spacing:.15em; margin-bottom:.8rem; }
.twitch-row { display:flex; gap:.6rem; }
.twitch-status { margin-top:.7rem; color:var(--silver); font-size:.9rem; }
</style>
</head>
<body>

<!-- NOVO -->
<button id="rank-btn" onclick="toggleRankPanel()">🏆</button>
<div id="rank-panel">
  <div class="rank-head">
    <div class="rank-title">TOP 100</div>
    <button class="rank-close" onclick="toggleRankPanel()">✕</button>
  </div>
  <div class="rank-list" id="rank-list">
    <div class="rank-empty">Sem participantes ainda…</div>
  </div>
</div>

<button id="twitch-fab" onclick="openTwitchModal()">📺</button>
<div class="overlay" id="twitch-overlay">
  <div class="twitch-card">
    <div class="twitch-title">Integração Twitch</div>
    <div class="twitch-row">
      <input type="text" id="twitch-url" placeholder="https://www.twitch.tv/tealzlol">
      <button class="btn-go" onclick="saveTwitchChannel()">Conectar</button>
    </div>
    <div class="twitch-status" id="twitch-status">Cole o link do streamer e clique em Conectar.</div>
    <div style="margin-top:.8rem;display:flex;justify-content:flex-end;">
      <button class="btn-sm" onclick="closeTwitchModal()">Fechar</button>
    </div>
  </div>
</div>

<script>
// ================================
// MANTIVE TODA SUA LÓGICA ORIGINAL
// ================================

// ================================
// NOVO: Config backend
// ================================
const API_BASE = "https://reidamesa.onrender.com";

// ================================
// NOVO: UI Twitch/Rank
// ================================
function toggleRankPanel(){ el('rank-panel').classList.toggle('open'); }
function openTwitchModal(){ el('twitch-overlay').classList.add('active'); }
function closeTwitchModal(){ el('twitch-overlay').classList.remove('active'); }

async function saveTwitchChannel(){
  const url = el('twitch-url').value.trim();
  const status = el('twitch-status');
  if(!url){ status.textContent='Informe o link da Twitch.'; return; }
  status.textContent='Conectando...';
  try{
    const r = await fetch(`${API_BASE}/api/connect-channel`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ twitchUrl:url })
    });
    const j = await r.json();
    if(!r.ok) throw new Error(j.error || 'Falha ao conectar');
    status.textContent = `Conectado no canal: ${j.channel}`;
  }catch(err){
    status.textContent = `Erro: ${err.message}`;
  }
}

function renderRanking(top){
  const list = el('rank-list');
  if(!top?.length){
    list.innerHTML = '<div class="rank-empty">Sem participantes ainda…</div>';
    return;
  }
  list.innerHTML = top.slice(0,100).map((x,i)=>`
    <div class="rank-item">
      <div class="rank-pos">#${i+1}</div>
      <div class="rank-user">${escapeHtml(x.user)}</div>
      <div class="rank-pts">${x.points} pts</div>
    </div>
  `).join('');
}
async function fetchRanking(){
  try{
    const r = await fetch(`${API_BASE}/api/ranking`);
    const j = await r.json();
    renderRanking(j.top || []);
  }catch(e){}
}
setInterval(fetchRanking, 5000);
fetchRanking();

// ================================
// NOVO: quando fechar rodada no seu jogo
// acopla ao backend de apostas
// ================================
const _registerWinOriginal = registerWin;
registerWin = async function(side){
  _registerWinOriginal(side); // mantém seu fluxo visual atual

  try{
    const r = await fetch(`${API_BASE}/api/resolve-round`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        winnerSide: side,
        player1: G.king,
        player2: G.challenger
      })
    });
    const j = await r.json();
    if(r.ok){
      fetchRanking();
      // opcional: mensagem discreta
      console.log(`Apostas resolvidas: +10 para ${j.winnersCount} usuário(s).`);
    }
  }catch(err){
    console.error('Erro ao resolver rodada de apostas:', err);
  }
};

function escapeHtml(str=''){
  return str.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;");
}
</script>
